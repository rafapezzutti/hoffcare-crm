<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P. Soluções para Saúde — Tutorial Interativo</title>
<style>
/* ============================================================
   DESIGN TOKEN — idêntico ao index.css do sistema real
   ============================================================ */
:root {
  --orange:       #E8841A;
  --orange-light: #F5A84A;
  --orange-dark:  #C46A10;
  --blue:         #4DB8E8;
  --blue-light:   #7DCEF2;
  --blue-dark:    #2A9FD4;
  --white:        #FFFFFF;
  --gray-50:      #F8F9FA;
  --gray-100:     #F1F3F5;
  --gray-200:     #E9ECEF;
  --gray-300:     #DEE2E6;
  --gray-400:     #CED4DA;
  --gray-500:     #ADB5BD;
  --gray-600:     #6C757D;
  --gray-700:     #495057;
  --gray-800:     #343A40;
  --gray-900:     #212529;
  --success:      #28A745;
  --danger:       #DC3545;
  --warning:      #FFC107;
  --shadow-sm:    0 1px 3px rgba(0,0,0,0.10);
  --shadow:       0 2px 10px rgba(0,0,0,0.12);
  --shadow-lg:    0 8px 24px rgba(0,0,0,0.15);
  --radius:       10px;
  --radius-sm:    6px;
  --radius-lg:    16px;
  --sidebar-bg1:  #1a2a3a;
  --sidebar-bg2:  #0d1b2a;
}

/* ============================================================
   TUTORIAL SHELL (não faz parte do sistema)
   ============================================================ */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0f1a;
  color: var(--gray-800);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-size: 14px;
}

/* ---- Tutorial topbar ---- */
.t-topbar {
  background: linear-gradient(90deg, #0d1b2a 0%, #1a2a3a 100%);
  color: white;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(77,184,232,0.2);
}
.t-brand { display:flex; align-items:center; gap:10px; }
.t-brand-text { line-height:1.1; }
.t-brand-text b { font-size:14px; color:var(--blue); font-weight:800; }
.t-brand-text small { font-size:11px; color:var(--orange); font-weight:600; display:block; }
.t-label { font-size:12px; color:rgba(255,255,255,0.45); font-weight:400; }
.t-prog-wrap { flex:1; max-width:380px; margin:0 auto; }
.t-prog-meta { display:flex; justify-content:space-between; font-size:11px; color:rgba(255,255,255,0.5); margin-bottom:4px; }
.t-prog-bar { height:4px; background:rgba(255,255,255,0.12); border-radius:2px; overflow:hidden; }
.t-prog-fill { height:100%; background:var(--orange); border-radius:2px; transition:width .5s ease; }
.t-step-info { font-size:12px; color:rgba(255,255,255,0.5); min-width:110px; text-align:right; }

/* ---- Tutorial nav sidebar ---- */
.t-main { display:flex; flex:1; overflow:hidden; }

.t-nav {
  width: 200px;
  background: #111b27;
  overflow-y: auto;
  flex-shrink: 0;
  padding: 12px 0;
  border-right: 1px solid rgba(255,255,255,0.05);
}
.t-nav::-webkit-scrollbar { width:3px; }
.t-nav::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
.t-nav-section {
  font-size:9px; font-weight:700; text-transform:uppercase;
  letter-spacing:1.2px; color:rgba(255,255,255,0.25);
  padding:10px 14px 3px;
}
.t-nav-item {
  display:flex; align-items:center; gap:8px;
  padding:9px 14px; cursor:pointer;
  font-size:12px; color:rgba(255,255,255,0.45);
  border-left:3px solid transparent;
  transition:all .15s;
}
.t-nav-item:hover { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.75); }
.t-nav-item.active { background:rgba(77,184,232,0.12); color:var(--blue); border-left-color:var(--blue); }
.t-nav-item.done { color:rgba(255,255,255,0.3); }
.t-nav-item.done .t-num { background:var(--success); color:white; }
.t-num {
  width:19px; height:19px; border-radius:50%;
  background:rgba(255,255,255,0.1);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; flex-shrink:0;
}
.t-nav-item.active .t-num { background:var(--blue); color:white; }

/* ---- Content area ---- */
.t-content { flex:1; display:flex; overflow:hidden; }

/* ---- Screen panel ---- */
.t-screen { flex:1; background:#131c28; display:flex; align-items:center; justify-content:center; padding:16px; overflow:hidden; }

.browser-wrap {
  width:100%; max-width:780px;
  background:var(--gray-50);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 20px 60px rgba(0,0,0,0.5);
}
.browser-bar {
  background:#e0e3e7; padding:7px 10px;
  display:flex; align-items:center; gap:8px;
  border-bottom:1px solid #ccc;
}
.b-dots { display:flex; gap:5px; }
.b-dot { width:10px; height:10px; border-radius:50%; }
.b-dot:nth-child(1){background:#ff5f57}
.b-dot:nth-child(2){background:#febc2e}
.b-dot:nth-child(3){background:#28c840}
.b-url {
  flex:1; background:white; border-radius:5px;
  padding:3px 10px; font-size:11px; color:#555;
  border:1px solid #ccc;
}

/* ---- Instruction panel ---- */
.t-instr {
  width:290px; background:white;
  border-left:1px solid var(--gray-200);
  display:flex; flex-direction:column; overflow:hidden; flex-shrink:0;
}
.t-instr-head {
  padding:18px 20px;
  background:linear-gradient(135deg, var(--sidebar-bg1), var(--sidebar-bg2));
  color:white; border-bottom:3px solid var(--orange);
}
.t-instr-badge {
  font-size:9px; font-weight:700; text-transform:uppercase;
  letter-spacing:1.2px; color:var(--orange);
  background:rgba(232,132,26,0.15); padding:2px 8px;
  border-radius:20px; display:inline-block; margin-bottom:7px;
}
.t-instr-title { font-size:16px; font-weight:700; margin-bottom:4px; }
.t-instr-sub { font-size:11px; color:rgba(255,255,255,0.6); line-height:1.4; }
.t-instr-body { flex:1; overflow-y:auto; padding:18px; }
.t-instr-body::-webkit-scrollbar{width:3px}
.t-instr-body::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:2px}
.t-instr-foot {
  padding:12px 16px; border-top:1px solid var(--gray-200);
  display:flex; gap:8px;
}
.t-btn {
  flex:1; padding:9px; border-radius:var(--radius-sm);
  border:none; cursor:pointer; font-size:12px; font-weight:600;
  transition:all .2s;
}
.t-btn-prev { background:var(--gray-100); color:var(--gray-600); border:1px solid var(--gray-300); }
.t-btn-prev:hover { background:var(--gray-200); }
.t-btn-next { background:var(--orange); color:white; }
.t-btn-next:hover { background:var(--orange-dark); }
.t-btn:disabled { opacity:.4; cursor:not-allowed; }

/* Instruction list items */
.i-section { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--blue-dark); margin-bottom:10px; }
.i-item { display:flex; gap:10px; margin-bottom:12px; align-items:flex-start; }
.i-icon {
  width:26px; height:26px; border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; font-size:13px;
}
.i-icon.or { background:rgba(232,132,26,0.12); color:var(--orange); }
.i-icon.bl { background:rgba(77,184,232,0.12); color:var(--blue-dark); }
.i-icon.gr { background:rgba(40,167,69,0.12); color:var(--success); }
.i-text strong { display:block; font-size:12px; color:var(--gray-800); margin-bottom:1px; }
.i-text span { font-size:11px; color:var(--gray-600); line-height:1.45; }
.i-tip {
  background:#fffbeb; border:1px solid #fde68a;
  border-radius:7px; padding:10px 12px; margin-top:14px;
  font-size:11px; color:#92400e; line-height:1.5;
  display:flex; gap:7px; align-items:flex-start;
}
.i-tip .ti { flex-shrink:0; }

/* Slide-in animation */
@keyframes sIn { from{opacity:0;transform:translateX(14px)} to{opacity:1;transform:translateX(0)} }
.anim { animation:sIn .3s ease; }

/* ============================================================
   SISTEMA — componentes idênticos ao código real
   ============================================================ */

/* ---- App layout mockup ---- */
.app { display:flex; height:440px; background:var(--gray-50); }

/* ---- Sidebar real ---- */
.s-bar {
  width:195px;
  background:linear-gradient(180deg, var(--sidebar-bg1) 0%, var(--sidebar-bg2) 100%);
  color:white; display:flex; flex-direction:column;
  flex-shrink:0; overflow:hidden;
}
.s-logo {
  padding:14px 14px 10px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.s-logo-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.s-brand-p { font-size:13px; font-weight:800; color:var(--blue); line-height:1.1; letter-spacing:.3px; }
.s-brand-s { font-size:10px; font-weight:600; color:var(--orange); letter-spacing:.3px; }
.s-clinic-label { font-size:8px; color:var(--gray-600); letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; }
.s-clinic-btn {
  width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  border-radius:5px; padding:5px 8px; color:var(--gray-300); font-size:11px; font-weight:600;
  display:flex; align-items:center; gap:6px; cursor:pointer;
}
.s-clinic-icon { color:var(--orange); font-size:9px; }

.s-nav { flex:1; padding:6px 0; overflow:hidden; }
.s-section {
  font-size:9px; font-weight:600; text-transform:uppercase;
  letter-spacing:.9px; color:var(--gray-600); padding:8px 14px 2px;
}
.s-link {
  display:flex; align-items:center; gap:8px;
  padding:8px 14px; color:var(--gray-400);
  font-size:11px; cursor:pointer;
  border-left:3px solid transparent;
  transition:all .15s;
}
.s-link:hover { background:rgba(255,255,255,0.06); color:white; }
.s-link.active { background:rgba(77,184,232,0.15); color:var(--blue); border-left-color:var(--blue); }
.s-link i { width:14px; font-size:12px; }

.s-bottom {
  padding:10px 14px; border-top:1px solid rgba(255,255,255,0.08);
  display:flex; align-items:center; gap:8px;
}
.s-avatar {
  width:28px; height:28px; border-radius:50%;
  background:var(--orange); color:white;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; flex-shrink:0;
}
.s-user-name { font-size:11px; color:var(--gray-300); font-weight:500; }
.s-user-role { font-size:9px; color:var(--gray-600); }

/* ---- Main content real ---- */
.s-main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

.s-topbar {
  background:white; padding:10px 18px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--gray-200);
  box-shadow:var(--shadow-sm); flex-shrink:0;
}
.s-topbar-title { font-size:15px; font-weight:600; color:var(--gray-800); }
.s-topbar-right { display:flex; align-items:center; gap:8px; }
.s-t-avatar {
  width:30px; height:30px; border-radius:50%;
  background:var(--blue); color:white;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700;
}

.s-page { flex:1; overflow-y:auto; padding:16px 18px; }
.s-page::-webkit-scrollbar{width:4px}
.s-page::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:2px}

.s-page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.s-page-title { font-size:17px; font-weight:700; color:var(--gray-800); }
.s-page-sub { font-size:11px; color:var(--gray-500); margin-top:1px; }

/* Real card */
.s-card {
  background:white; border-radius:var(--radius);
  padding:16px; border:1px solid var(--gray-200);
  box-shadow:var(--shadow-sm); margin-bottom:12px;
}
.s-card-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--gray-100);
}
.s-card-title { font-size:13px; font-weight:600; color:var(--gray-800); }

/* Stats grid */
.s-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:12px; }
.s-stat {
  background:white; border-radius:var(--radius);
  padding:14px; border:1px solid var(--gray-200);
  display:flex; align-items:center; gap:12px;
  box-shadow:var(--shadow-sm); cursor:pointer;
}
.s-stat-icon {
  width:40px; height:40px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:17px; flex-shrink:0;
}
.s-stat-icon.or { background:rgba(232,132,26,0.12); color:var(--orange); }
.s-stat-icon.bl { background:rgba(77,184,232,0.12); color:var(--blue); }
.s-stat-icon.gr { background:rgba(40,167,69,0.12); color:var(--success); }
.s-stat-icon.pu { background:rgba(108,117,255,0.12); color:#6c75ff; }
.s-stat-val { font-size:22px; font-weight:700; color:var(--gray-800); }
.s-stat-lbl { font-size:10px; color:var(--gray-500); }

/* Real table */
.s-table { width:100%; border-collapse:collapse; font-size:12px; }
.s-table th {
  padding:7px 12px; text-align:left; font-size:10px; font-weight:600;
  text-transform:uppercase; letter-spacing:.5px;
  color:var(--gray-500); border-bottom:2px solid var(--gray-200);
  background:var(--gray-50);
}
.s-table td {
  padding:10px 12px; border-bottom:1px solid var(--gray-100);
  color:var(--gray-700); vertical-align:middle;
}
.s-table tbody tr:hover td { background:var(--gray-50); }

/* Real badges */
.badge { display:inline-flex; align-items:center; padding:2px 9px; border-radius:20px; font-size:10px; font-weight:600; }
.badge-blue  { background:rgba(77,184,232,0.15);  color:var(--blue-dark); }
.badge-orange{ background:rgba(232,132,26,0.15);  color:var(--orange-dark); }
.badge-green { background:rgba(40,167,69,0.15);   color:var(--success); }
.badge-red   { background:rgba(220,53,69,0.15);   color:var(--danger); }
.badge-gray  { background:var(--gray-100);         color:var(--gray-600); }

/* Real buttons */
.btn { display:inline-flex; align-items:center; gap:5px; padding:7px 14px;
  border-radius:var(--radius-sm); font-size:12px; font-weight:500;
  cursor:pointer; border:none; transition:all .2s; }
.btn-primary { background:var(--orange); color:white; }
.btn-primary:hover { background:var(--orange-dark); }
.btn-secondary { background:var(--blue); color:white; }
.btn-secondary:hover { background:var(--blue-dark); }
.btn-outline { background:transparent; border:1.5px solid var(--gray-300); color:var(--gray-700); }
.btn-outline:hover { border-color:var(--orange); color:var(--orange); }
.btn-success { background:var(--success); color:white; }
.btn-danger { background:var(--danger); color:white; }
.btn-sm { padding:5px 10px; font-size:11px; }

/* Real form controls */
.fc {
  width:100%; padding:7px 10px; border:1.5px solid var(--gray-300);
  border-radius:var(--radius-sm); font-size:12px; color:var(--gray-800);
  background:white; font-family:inherit;
}
.fc:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(77,184,232,0.12); }
.fc.filled { border-color:var(--blue); background:#f7fcff; }
.fc.typing { border-color:var(--blue); box-shadow:0 0 0 3px rgba(77,184,232,0.12); }
.form-label { display:block; font-size:11px; font-weight:500; color:var(--gray-700); margin-bottom:4px; }
.form-label .req { color:var(--danger); margin-left:2px; }
.fg { margin-bottom:12px; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }

/* ---- Login page real ---- */
.login-bg {
  min-height:440px; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg, var(--sidebar-bg1) 0%, var(--sidebar-bg2) 50%, #162236 100%);
}
.login-card {
  background:white; border-radius:var(--radius-lg);
  padding:36px 32px; width:100%; max-width:360px;
  box-shadow:var(--shadow-lg);
}
.login-logo { text-align:center; margin-bottom:24px; }
.login-logo-row { display:flex; align-items:center; justify-content:center; gap:12px; }
.login-brand-p { font-size:20px; font-weight:800; color:var(--blue); line-height:1.1; letter-spacing:.3px; }
.login-brand-s { font-size:13px; font-weight:600; color:var(--orange); letter-spacing:1px; }
.login-sub { font-size:10px; color:var(--gray-400); letter-spacing:2px; margin-top:8px; }
.login-title { font-size:13px; font-weight:600; color:var(--gray-700); margin-top:14px; }
.login-powered { text-align:center; font-size:10px; color:var(--gray-400); margin-top:18px; }

/* ---- Timeline (agenda do dia) ---- */
.timeline-row {
  display:flex; border-bottom:1px solid var(--gray-100); min-height:52px;
}
.timeline-hour {
  width:52px; padding:6px 10px; color:var(--gray-400);
  font-size:11px; font-weight:500; flex-shrink:0; padding-top:8px;
}
.timeline-slot {
  flex:1; padding:5px 8px; display:flex; flex-wrap:wrap; gap:6px;
}
.apt-card {
  border-radius:7px; padding:5px 10px; min-width:180px; cursor:pointer;
  border-width:1.5px; border-style:solid;
}
.apt-card.medico {
  background:rgba(232,132,26,0.10); border-color:var(--orange);
}
.apt-card.dentista {
  background:rgba(77,184,232,0.10); border-color:var(--blue);
}
.apt-name { font-weight:600; font-size:12px; color:var(--gray-800); }
.apt-meta { font-size:10px; color:var(--gray-500); }
.apt-badges { display:flex; gap:5px; margin-top:3px; align-items:center; }

/* Procedure row */
.proc-row {
  display:flex; gap:8px; align-items:center;
  padding:8px 10px; background:var(--gray-50);
  border-radius:var(--radius-sm); margin-bottom:7px;
}
.proc-name-col { flex:1; }
.proc-code { font-size:10px; color:var(--gray-400); font-family:monospace; }
.proc-name { font-size:12px; }
.proc-val { width:100px; }
.total-box {
  background:var(--gray-800); color:white;
  padding:11px 16px; border-radius:var(--radius-sm);
  display:flex; justify-content:space-between; align-items:center;
  font-weight:600; margin-top:10px;
}
.total-val { font-size:17px; }

/* Blinking cursor */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.cursor { animation:blink 1s infinite; }

/* Welcome screen */
.welcome-bg {
  height:440px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; text-align:center;
  padding:28px;
  background:linear-gradient(145deg, var(--sidebar-bg2) 0%, var(--sidebar-bg1) 60%, #1e3050 100%);
  color:white; position:relative; overflow:hidden;
}
.welcome-bg::before {
  content:''; position:absolute; top:-80px; right:-60px;
  width:220px; height:220px; border-radius:50%;
  background:radial-gradient(circle, rgba(77,184,232,0.12), transparent 70%);
}
.welcome-badge {
  background:rgba(232,132,26,0.2); border:1px solid rgba(232,132,26,0.4);
  color:var(--orange); padding:4px 14px; border-radius:20px;
  font-size:10px; font-weight:700; letter-spacing:1.5px;
  text-transform:uppercase; margin-bottom:14px;
}
.welcome-features { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; width:100%; max-width:460px; margin-top:20px; }
.wf { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:10px; font-size:11px; opacity:.85; }
.wf .wi { font-size:18px; margin-bottom:3px; }

/* Tabs real */
.s-tabs { display:flex; gap:3px; border-bottom:2px solid var(--gray-200); margin-bottom:14px; }
.s-tab {
  padding:8px 14px; font-size:12px; font-weight:500;
  cursor:pointer; border:none; background:none; color:var(--gray-600);
  border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .2s;
}
.s-tab:hover { color:var(--blue); }
.s-tab.active { color:var(--blue); border-bottom-color:var(--blue); }

/* Empty state */
.empty { text-align:center; padding:30px 20px; color:var(--gray-400); }
.empty .ei { font-size:32px; margin-bottom:8px; }
.empty p { font-size:12px; }

/* Pulse highlight */
@keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(232,132,26,.5)} 70%{box-shadow:0 0 0 7px rgba(232,132,26,0)} 100%{box-shadow:0 0 0 0 rgba(232,132,26,0)} }
.highlight { animation:pulse 1.8s ease infinite; }

/* Info panel items */
.anim { animation:sIn .35s ease; }
</style>
</head>
<body>

<!-- ===== TUTORIAL TOP BAR ===== -->
<div class="t-topbar">
  <div class="t-brand">

// ============================================================
// STATE & RENDER
// ============================================================
let cur = 0;
const total = STEPS.length;

function goTo(i) {
  if (i < 0 || i >= total) return;
  cur = i;
  render();
}
function next() { goTo(cur + 1); }
function prev() { goTo(cur - 1); }

function render() {
  const s = STEPS[cur];
  const pct = Math.round((cur / (total - 1)) * 100);

  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-label').textContent = s.badge;
  document.getElementById('step-cur').textContent = cur + 1;
  document.getElementById('step-total').textContent = total;
  document.getElementById('url-bar').textContent = s.url;
  document.getElementById('screen').innerHTML = s.screen();
  document.getElementById('instr-badge').textContent = s.badge;
  document.getElementById('instr-title').textContent = s.title;
  document.getElementById('instr-sub').textContent = s.sub;
  document.getElementById('instr-body').innerHTML = s.instr();

  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  btnPrev.disabled = cur === 0;
  btnNext.textContent = cur === total - 1 ? '✓ Concluído' : 'Próximo →';

  for (let i = 0; i < total; i++) {
    const el = document.getElementById('nav-' + i);
    if (!el) continue;
    el.classList.remove('active', 'done');
    if (i === cur) el.classList.add('active');
    else if (i < cur) el.classList.add('done');
  }
}

render();
</script>
